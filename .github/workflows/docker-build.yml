name: Docker Build

on:
  workflow_call:
    inputs:
      component:
        description: "Component to build (server, sandbox, cluster)"
        required: true
        type: string
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 20
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: true

env:
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SCCACHE_MEMCACHED_ENDPOINT: ${{ vars.SCCACHE_MEMCACHED_ENDPOINT }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ inputs.component }}
    runs-on: build-amd64
    timeout-minutes: ${{ inputs.timeout-minutes }}
    container:
      image: ghcr.io/nvidia/nemoclaw/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_REGISTRY: ghcr.io/nvidia/nemoclaw
      DOCKER_PUSH: ${{ inputs.push && '1' || '0' }}
      DOCKER_PLATFORM: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute cargo version
        id: version
        run: |
          set -eu
          echo "cargo_version=$(uv run python tasks/scripts/release.py get-version --cargo)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Build ${{ inputs.component }} image
        env:
          DOCKER_BUILDER: navigator
          NEMOCLAW_CARGO_VERSION: ${{ steps.version.outputs.cargo_version }}
        run: mise run --no-prepare docker:build:${{ inputs.component }}
