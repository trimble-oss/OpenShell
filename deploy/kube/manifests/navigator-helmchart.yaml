# HelmChart CR for auto-deploying NemoClaw via k3s Helm controller
# This manifest is placed in /var/lib/rancher/k3s/server/manifests/ and
# automatically installed when the k3s cluster starts.
#
# The chart tarball is served from the k3s static file server at:
# https://<k8s-api>/static/charts/navigator-0.1.0.tgz
#
# Component images are pulled at runtime from ghcr.io.
# Authentication is configured via /etc/rancher/k3s/registries.yaml
# (containerd-level) and a Kubernetes imagePullSecret (pod-level),
# both generated by the bootstrap process.

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: navigator
  namespace: kube-system
spec:
  chart: https://%{KUBERNETES_API}%/static/charts/navigator-0.1.0.tgz
  targetNamespace: navigator
  createNamespace: true
  valuesContent: |-
    chartChecksum: __CHART_CHECKSUM__
    image:
      repository: ghcr.io/nvidia/nemoclaw/server
      tag: latest
      pullPolicy: Always
    server:
      sandboxImage: ghcr.io/nvidia/nemoclaw/sandbox:latest
      sshGatewayHost: __SSH_GATEWAY_HOST__
      sshGatewayPort: __SSH_GATEWAY_PORT__
      sshHandshakeSecret: __SSH_HANDSHAKE_SECRET__
      grpcEndpoint: "https://navigator.navigator.svc.cluster.local:8080"
      disableGatewayAuth: __DISABLE_GATEWAY_AUTH__
      disableTls: __DISABLE_TLS__
      tls:
        certSecretName: navigator-server-tls
        clientCaSecretName: navigator-server-client-ca
        clientTlsSecretName: navigator-client-tls
