# Default values for NemoClaw

replicaCount: 1

image:
  repository: ghcr.io/nvidia/nemoclaw/server
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: NodePort
  port: 8080
  nodePort: 30051

# Pod restart behavior and health probe tuning.
podLifecycle:
  terminationGracePeriodSeconds: 5

probes:
  liveness:
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 1
    periodSeconds: 2
    timeoutSeconds: 1
    failureThreshold: 3

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Server configuration
server:
  logLevel: info
  sandboxNamespace: navigator
  dbUrl: "sqlite:/var/navigator/navigator.db"
  sandboxImage: "ghcr.io/nvidia/nemoclaw/sandbox:latest"
  # gRPC endpoint for sandboxes to callback to NemoClaw (must be reachable from pods)
  grpcEndpoint: "https://navigator.navigator.svc.cluster.local:8080"
  # Public host/port returned to CLI clients for SSH proxy CONNECT requests.
  # For local clusters the default 127.0.0.1:8080 is correct; for remote
  # clusters these should be set to the externally reachable host and port.
  sshGatewayHost: ""
  sshGatewayPort: 0
  # TLS configuration for the server. The server always terminates mTLS
  # directly and requires client certificates.
  # HMAC secret used for the NSSH1 handshake between gateway and sandbox SSH.
  # Required — the server will refuse to start if empty. For cluster deployments
  # this is auto-generated by the entrypoint script.
  sshHandshakeSecret: ""
  # Disable gateway authentication (mTLS client certificate requirement).
  # Set to true when the gateway sits behind a reverse proxy (e.g.
  # Cloudflare Tunnel) that terminates TLS.
  disableGatewayAuth: false
  # Disable TLS entirely — the server listens on plaintext HTTP.
  # Set to true when a reverse proxy / tunnel terminates TLS at the edge.
  disableTls: false
  tls:
    # K8s secret (type kubernetes.io/tls) with tls.crt and tls.key for the server
    certSecretName: navigator-server-tls
    # K8s secret with ca.crt for client certificate verification
    clientCaSecretName: navigator-server-client-ca
    # K8s secret mounted into sandbox pods for mTLS to the server
    clientTlsSecretName: navigator-client-tls

# NetworkPolicy restricting SSH ingress on sandbox pods to the gateway only.
networkPolicy:
  enabled: true
